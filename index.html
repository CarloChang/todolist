<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  <script defer src="bundle.js"></script></head>
  <body class="bg-gray-100 min-h-screen">

    <div class="flex flex-col md:grid md:grid-cols-[220px_1fr] min-h-screen">

      <!-- sidebar — horizontal bar on mobile, vertical on desktop -->
      <aside class="bg-gray-900 text-white flex flex-row md:flex-col gap-1 md:gap-2 px-4 py-3 md:p-6 items-center md:items-stretch overflow-x-auto">
        <h2 class="text-base md:text-xl font-bold md:mb-6 mr-3 md:mr-0 whitespace-nowrap">Todo List</h2>
        <a href="#" class="hover:bg-gray-700 rounded px-2 md:px-3 py-2 flex items-center gap-2 whitespace-nowrap text-sm md:text-base">
          <i class="fas fa-gauge"></i>
          <span class="hidden md:inline">Dashboard</span>
        </a>
        <a href="#" class="hover:bg-gray-700 rounded px-2 md:px-3 py-2 flex items-center gap-2 whitespace-nowrap text-sm md:text-base">
          <i class="fas fa-list-check"></i>
          <span class="hidden md:inline">Tasks</span>
        </a>
        <a href="#" class="hover:bg-gray-700 rounded px-2 md:px-3 py-2 flex items-center gap-2 whitespace-nowrap text-sm md:text-base">
          <i class="fas fa-calendar"></i>
          <span class="hidden md:inline">Calendar</span>
        </a>
        <a href="https://github.com/CarloChang/" target="_blank" class="hover:bg-gray-700 rounded px-2 md:px-3 py-2 flex items-center gap-2 whitespace-nowrap text-sm md:text-base">
          <i class="fab fa-github"></i>
          <span class="hidden md:inline">GitHub</span>
        </a>
      </aside>

      <!-- main -->
      <main class="p-4 md:p-8 flex flex-col gap-4 md:gap-6">
        <div class="flex items-center justify-between">
          <h1 class="text-xl md:text-2xl font-bold text-gray-800">My Tasks</h1>
          <button id="add-task-btn"
            class="bg-blue-500 hover:bg-blue-600 text-white px-3 md:px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
            <i class="fas fa-plus"></i>
            <span class="hidden sm:inline">Add Task</span>
          </button>
        </div>

        <div id="task-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </main>

    </div>

    <template id="modal-template">
      <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl p-5 md:p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-800">New Task</h2>
            <button class="close-btn text-gray-400 hover:text-gray-600">
              <i class="fas fa-xmark"></i>
            </button>
          </div>
          <form class="task-form flex flex-col gap-3">
            <input name="title" type="text" placeholder="Title *" required
              class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            <textarea name="description" placeholder="Description" rows="2"
              class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
            <input name="dueDate" type="date"
              class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            <div class="relative">
              <select name="priority"
                class="w-full appearance-none border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 pr-8">
                <option value="low">Low priority</option>
                <option value="medium" selected>Medium priority</option>
                <option value="high">High priority</option>
              </select>
              <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
            </div>
            <textarea name="notes" placeholder="Notes" rows="2"
              class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
            <div>
              <p class="text-sm text-gray-500 mb-1">Checklist</p>
              <div class="flex gap-2 mb-2">
                <input class="checklist-input flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                  type="text" placeholder="Add item" />
                <button type="button" class="checklist-add bg-gray-100 hover:bg-gray-200 px-3 py-2 rounded-lg text-sm whitespace-nowrap">
                  Add
                </button>
              </div>
              <ul class="checklist-items flex flex-col gap-1 text-sm"></ul>
            </div>
            <button type="submit"
              class="bg-blue-500 hover:bg-blue-600 text-white rounded-lg py-2 text-sm font-medium mt-1">
              Add Task
            </button>
          </form>
        </div>
      </div>
    </template>

  </body>
</html>
